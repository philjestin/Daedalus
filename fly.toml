# fly.toml app configuration file for daedalus
# See https://fly.io/docs/reference/configuration/

app = 'daedalus'
primary_region = 'dfw'

[build]

[env]
  PORT = '8080'
  APP_NAME = 'Daedalus'
  REQUIRE_AUTH = 'true'
  UPLOAD_DIR = '/app/uploads'
  STATIC_DIR = '/app/web/dist'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  timeout = '5s'

[mounts]
  source = 'daedalus_uploads'
  destination = '/app/uploads'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
