name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact_name: Daedalus.app
            asset_name: Daedalus-macos-universal
            wails_flags: ""
          - os: windows-latest
            platform: windows/amd64
            artifact_name: Daedalus.exe
            asset_name: Daedalus-windows-amd64
            wails_flags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: Daedalus
            asset_name: Daedalus-linux-amd64
            wails_flags: "-tags webkit2_41"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version info
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build Wails app
        run: |
          wails build -platform ${{ matrix.platform }} ${{ matrix.wails_flags }} \
            -ldflags "-X github.com/philjestin/daedalus/internal/version.Version=${{ env.VERSION }} -X github.com/philjestin/daedalus/internal/version.Commit=${{ env.COMMIT }} -X github.com/philjestin/daedalus/internal/version.Date=${{ env.DATE }} -X github.com/philjestin/daedalus/internal/version.BuiltBy=ci"

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r ${{ matrix.asset_name }}.zip Daedalus.app

      - name: Package Windows app
        if: runner.os == 'Windows'
        run: |
          cd build/bin
          Compress-Archive -Path Daedalus.exe -DestinationPath ${{ matrix.asset_name }}.zip

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          tar -czvf ${{ matrix.asset_name }}.tar.gz Daedalus

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            build/bin/*.zip
            build/bin/*.tar.gz
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
